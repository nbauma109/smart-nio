name: "Maven Release"

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to cut
        required: true
      next_version:
        description: Next development version, for example 0.2.0-SNAPSHOT
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ secrets.KNOWN_HOSTS }}
          ssh-strict: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Git config
        run: |
          git config user.email "git@github.com"
          git config user.name "git"

      - name: Release with Maven
        run: >
          mvn --no-transfer-progress -B
          "-DreleaseVersion=${{ inputs.release_version }}"
          "-DdevelopmentVersion=${{ inputs.next_version }}"
          "-Dtag=${{ inputs.release_version }}"
          "-Darguments=-Dgpg.skip=true"
          release:clean release:prepare
