name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to cut
        required: true
      next_version:
        description: Next development version, for example 0.2.0-SNAPSHOT
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ secrets.KNOWN_HOSTS }}
          ssh-strict: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure authenticated remote
        run: git remote set-url origin git@github.com:nbauma109/smart-nio.git

      - name: Prepare release
        run: >
          mvn -B
          -DreleaseVersion=${{ inputs.release_version }}
          -DdevelopmentVersion=${{ inputs.next_version }}
          -Dtag=v${{ inputs.release_version }}
          release:clean release:prepare
